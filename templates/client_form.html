{% extends 'base.html' %}{% block title %}{{ 'Edit' if mode=='edit' else 'New' }} Client{% endblock %}{% block pt %}{{ 'Edit' if mode=='edit' else 'Add' }} Client{% endblock %}
{% block content %}<div style="max-width:680px;"><div class="pc">
  <div class="ph"><i class="bi bi-person-plus me-1"></i>{{ 'Edit Client' if mode=='edit' else 'New Client' }}</div>
  <div style="padding:22px;">
    <form method="POST"><div class="row g-3">
      <div class="col-md-6"><label class="form-label">Full Name *</label><input type="text" name="name" class="form-control" value="{{ cl.name if cl else '' }}" required></div>
      <div class="col-md-6"><label class="form-label">Company Name</label><input type="text" name="company_name" class="form-control" value="{{ cl.company_name if cl else '' }}"></div>
      <div class="col-md-6"><label class="form-label">TRN Number</label><input type="text" name="trn" class="form-control" value="{{ cl.trn if cl else '' }}"></div>
      <div class="col-md-6"><label class="form-label">Country</label><input type="text" name="country" class="form-control" value="{{ cl.country if cl else 'UAE' }}"></div>
      <div class="col-12"><label class="form-label">Address</label><input type="text" name="address" class="form-control" value="{{ cl.address if cl else '' }}"></div>
      <div class="col-md-6"><label class="form-label">Telephone</label><input type="text" name="telephone" class="form-control" value="{{ cl.telephone if cl else '' }}"></div>
      <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ cl.email if cl else '' }}"></div>
      <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2">{{ cl.notes if cl else '' }}</textarea></div>
    </div>
    <div class="d-flex gap-2 mt-4"><button type="submit" class="btn ba px-4"><i class="bi bi-save me-1"></i>Save</button><a href="{{ url_for('clients') }}" class="btn btn-outline-secondary">Cancel</a></div>
    </form>
  </div>
</div></div>{% endblock %}
