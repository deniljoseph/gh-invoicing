{% extends 'base.html' %}{% block title %}Change Password{% endblock %}{% block pt %}Change Password{% endblock %}
{% block content %}<div style="max-width:460px;"><div class="pc"><div class="ph"><i class="bi bi-key-fill me-1"></i>Change Password</div><div style="padding:22px;">
  <form method="POST">
    <div class="mb-3"><label class="form-label">Current Password</label><input type="password" name="current_password" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">New Password</label><input type="password" name="new_password" class="form-control" required minlength="6"></div>
    <div class="mb-4"><label class="form-label">Confirm New Password</label><input type="password" name="confirm_password" class="form-control" required minlength="6"></div>
    <button type="submit" class="btn ba px-4"><i class="bi bi-check-circle me-1"></i>Update Password</button>
  </form>
</div></div></div>{% endblock %}
